services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./tag_aliases.csv:/app/tag_aliases.csv:ro
    expose:
      - "8000"

  nginx:
    build: ./nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      # Vue build output goes here
      - ./frontend/dist:/usr/share/nginx/html:ro

volumes:
  pgdata:
